<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <rect x="1" y="10" width="4" height="10" fill="#00A0FF">
    <animate attributeName="height" values="10;18;6;14;10" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="10;2;14;6;10" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="8" y="4" width="4" height="16" fill="#00A0FF">
    <animate attributeName="height" values="16;8;18;4;16" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="4;12;2;16;4" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="15" y="7" width="4" height="13" fill="#00A0FF">
    <animate attributeName="height" values="13;18;5;15;13" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="7;2;15;5;7" dur="0.9s" repeatCount="indefinite"/>
  </rect>
</svg>
