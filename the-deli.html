        <div class="collapse navbar-collapse" id="navbarSupportedContent">

<section id="archive" class="tm-section-pad-top">
      <div class="container tm-container-archive">
        <div class="row">
          <div class="text-center col-12">
              <h2 class="tm-text-primary tm-section-title mb-4">The Deli</h2>
              <p class="mx-auto tm-section-desc">
              </p>
          </div>            
        </div>
        <div class="row">
            <div class="col-12 tm-content-box text-center">
                <a href="media/reviews/deli.jpg" target="_blank">
                    <img src="media/reviews/deli.jpg" alt="The Deli review" class="img-fluid" style="max-width:100%; cursor:zoom-in;">
                </a>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="mx-auto tm-gallery-container">
                    <div class="grid tm-gallery">
                      <a href="lyrics.html">
                        <figure class="effect-honey tm-gallery-item">
                          <img src="img/gallery-tn-01.jpg" alt="Lyrics &amp; Chords" class="img-fluid">
                          <figcaption>
                            <h2><i>Lyrics &amp; Chords</i></h2>
                          </figcaption>
                        </figure>
                      </a>
                      <a href="recordings.html">
                        <figure class="effect-honey tm-gallery-item">
                          <img src="img/gallery-tn-02.jpg" alt="Home Recordings" class="img-fluid">
                          <figcaption>
                            <h2><i>Home Recordings</i></h2>
                          </figcaption>
                        </figure>
                      </a>
                      <a href="artwork.html">
                        <figure class="effect-honey tm-gallery-item">
                          <img src="img/gallery-tn-03.jpg" alt="Artwork" class="img-fluid">
                          <figcaption>
                            <h2><i>Artwork</i></h2>
                          </figcaption>
                        </figure>
                      </a>
                      <a href="press.html">
                        <figure class="effect-honey tm-gallery-item">
                          <img src="img/gallery-tn-04.jpg" alt="Press" class="img-fluid">
                          <figcaption>
                            <h2><i>Press</i></h2>
                          </figcaption>
                        </figure>
                      </a>
                      <a href="https://amputee.band/" target="_blank">
                        <figure class="effect-honey tm-gallery-item">
                          <img src="img/gallery-tn-05.jpg" alt="Amputee" class="img-fluid">
                          <figcaption>
                            <h2><i>Amputee</i></h2>
                          </figcaption>
                        </figure>

                    </div>
                </div>
            </div>
        </div>
      </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="tm-section-pad-top tm-parallax-2">
    
      <div class="container tm-container-contact">
        
        <div class="row">
            
            <div class="text-center col-12">
                <h2 class="tm-section-title mb-4">Contact</h2>
            </div>
            
            <div class="col-sm-12 col-md-6">
              <form action="https://formspree.io/f/xvzyoqpa" method="POST">
                <input id="name" name="name" type="text" placeholder="Your Name" class="tm-input" required />
                <input id="email" name="email" type="email" placeholder="Your Email" class="tm-input" required />
                <textarea id="message" name="message" rows="8" placeholder="Message" class="tm-input" required></textarea>
                <button type="submit" class="btn tm-btn-submit">Submit</button>
              </form>
            </div>
            
            <div class="col-sm-12 col-md-6">
                <div class="contact-item">
                  <a rel="nofollow" href="mailto:k@kmcgee.com" class="item-link">
                      <i class="far fa-2x fa-envelope mr-4"></i>
                      <span class="mb-0">k@kmcgee.com</span>
                  </a>              
                </div>
            </div>
            
        </div><!-- row ending -->
        
      </div>

      <footer class="text-center small tm-footer">
          <p class="mb-0">
          Copyright &copy; 2026 Kieran McGee 
          </p>
          <p><a href="https://kmcgee.bandcamp.com/">Bandcamp</a></p>
        </footer>

    </section>
