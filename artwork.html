    <style>
      /* Lightbox */
      #tm-lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.88);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        cursor: zoom-out;
      }
      #tm-lightbox.active { display: flex; }
      #tm-lightbox img {
        max-width: 90vw;
        max-height: 90vh;
        box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        cursor: default;
        border-radius: 2px;
      }
      #tm-lightbox-close {
        position: fixed;
        top: 18px;
        right: 26px;
        color: #fff;
        font-size: 2.2rem;
        line-height: 1;
        cursor: pointer;
        user-select: none;
        opacity: 0.8;
      }
      #tm-lightbox-close:hover { opacity: 1; }
      .tm-painting-item img { cursor: zoom-in; }
    </style>
  </head>

              <form action="https://formspree.io/f/xvzyoqpa" method="POST">
